appId: gmbh.jakobs.timer
productName: JM Timer
artifactName: "${productName}-${version}-${os}-${arch}.${ext}"
copyright: "© ${author}"

directories:
  output: release
  buildResources: build

files:
  - out/**/*
  - package.json

asar: true

mac:
  target:
    - target: dmg
      arch:
        - arm64
        - x64
    - target: zip
      arch:
        - arm64
        - x64
  category: public.app-category.productivity
  # icon: build/icon.icns         # 1024x1024 ICNS — optional
  hardenedRuntime: false           # set true + add entitlements once notarising
  gatekeeperAssess: false

win:
  target:
    - target: nsis
      arch:
        - x64
  # icon: build/icon.ico           # 256x256 ICO — optional

linux:
  target:
    - target: AppImage
      arch:
        - x64
    - target: deb
      arch:
        - x64
  category: AudioVideo
  # icon: build/icon.png           # 512x512 PNG — optional

nsis:
  oneClick: false
  perMachine: false
  allowToChangeInstallationDirectory: true
  shortcutName: JM Timer

publish: null
