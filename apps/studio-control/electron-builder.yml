appId: gmbh.jakobs.studio-control
productName: JM Studio Control
artifactName: "${productName}-${version}-${os}-${arch}.${ext}"
copyright: "© Jakobs Medien GmbH"

directories:
  output: release
  buildResources: build

files:
  - out/**/*
  - package.json

extraResources:
  - from: resources
    to: .
    filter:
      - "**/*"

asar: true

# Native .node binaries cannot be loaded from inside the asar archive → unpack.
#   better-sqlite3 → audit/users DB.
#   @julusian/freetype2 → transitive native dep of atem-connection (ATEM driver);
#   muss für die Electron-ABI vorliegen (postinstall electron-rebuild / Prebuild).
# socket.io, obs-websocket-js (ws) et al. sind reines JS.
asarUnpack:
  - "**/node_modules/better-sqlite3/**"
  - "**/node_modules/@julusian/**"

mac:
  target:
    - target: dmg
      arch:
        - arm64
        - x64
  category: public.app-category.productivity
  icon: build/icon.png
  hardenedRuntime: false
  gatekeeperAssess: false

win:
  target:
    - target: nsis
      arch:
        - x64
  icon: build/icon.ico

linux:
  target:
    - target: AppImage
      arch:
        - x64
    - target: deb
      arch:
        - x64
  category: AudioVideo
  icon: build/icon.png

nsis:
  oneClick: false
  perMachine: false
  allowToChangeInstallationDirectory: true
  shortcutName: JM Studio Control
  createDesktopShortcut: false

publish:
  provider: github
  owner: AlexmachtCode
  repo: alexzvn
  private: true
