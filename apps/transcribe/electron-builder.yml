appId: gmbh.jakobs.transcribe
productName: JM Transcribe
artifactName: "${productName}-${version}-${os}-${arch}.${ext}"
copyright: "© Jakobs Medien GmbH"

directories:
  output: release
  buildResources: build

files:
  - out/**/*
  - package.json

extraResources:
  - from: resources
    to: .
    filter:
      - "**/*"

asar: true

# whisper.cpp-Binary + Basismodell werden LOKAL gestaged (bundle-whisper.mjs,
# braucht WHISPER_DIR + WHISPER_MODEL_BASE) — Windows (.exe/.dll) wie macOS
# (whisper-cli + *.dylib, arm64). electron ist ans Root gehoistet →
# electronVersion bei Electron-Upgrade nachziehen.
electronVersion: 33.4.11
npmRebuild: false

win:
  target:
    - target: nsis
      arch:
        - x64
  icon: build/icon.ico

# macOS (Apple Silicon). Unsigniert/nicht notarisiert → Gatekeeper-Quarantäne:
# beim ersten Start Rechtsklick → „Öffnen" bzw. `xattr -dr com.apple.quarantine`.
mac:
  target:
    - target: dmg
      arch:
        - arm64
  category: public.app-category.productivity
  icon: build/icon.png
  hardenedRuntime: false
  gatekeeperAssess: false

nsis:
  oneClick: false
  perMachine: false
  allowToChangeInstallationDirectory: true
  shortcutName: JM Transcribe
  createDesktopShortcut: false

publish:
  provider: github
  owner: AlexmachtCode
  repo: alexzvn
  private: true
