appId: gmbh.jakobs.battle
productName: JM Battle
artifactName: "${productName}-${version}-${os}-${arch}.${ext}"
copyright: "© Jakobs Medien GmbH"

directories:
  output: release
  buildResources: build

files:
  - out/**/*
  - package.json

extraResources:
  - from: resources
    to: .
    filter:
      - "**/*"

asar: true
# ffmpeg/ffprobe (ffmpeg-static) werden im prepackage nach resources/bin gestaged.
# Reines JS/statische Binaries → in CI baubar (kein lizenziertes SDK nötig).

mac:
  target:
    - target: dmg
      arch:
        - arm64
        - x64
  category: public.app-category.video
  icon: build/icon.png
  hardenedRuntime: false
  gatekeeperAssess: false

win:
  target:
    - target: nsis
      arch:
        - x64
  icon: build/icon.ico

linux:
  target:
    - target: AppImage
      arch:
        - x64
  category: AudioVideo
  icon: build/icon.png

nsis:
  oneClick: false
  perMachine: false
  allowToChangeInstallationDirectory: true
  shortcutName: JM Battle
  createDesktopShortcut: false

publish:
  provider: github
  owner: AlexmachtCode
  repo: alexzvn
  private: true
