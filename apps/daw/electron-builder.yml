appId: gmbh.jakobs.daw
productName: JM DAW
artifactName: "${productName}-${version}-${os}-${arch}.${ext}"
copyright: "© Jakobs Medien GmbH"

# Electron ist im Monorepo nach node_modules/ (Root) gehoist und liegt nicht in
# apps/daw/node_modules — darum die Version explizit setzen, sonst kann
# electron-builder sie nicht ermitteln. Muss zur installierten Version passen.
electronVersion: 33.4.11

# Kein nativer Rebuild durch electron-builder: das Audio-Addon (@jm/audio) wird
# zur Laufzeit aus resources/bin/win geladen (vom prepackage gestaged), nicht aus
# dem asar. Der von electron-builder angestossene `npm rebuild` scheitert zudem an
# den npm-Env-Configs (target-platform/update-binary) unter `npm run`.
npmRebuild: false

directories:
  output: release
  buildResources: build

files:
  - out/**/*
  - package.json

extraResources:
  - from: resources
    to: .
    filter:
      - "**/*"

asar: true

mac:
  target:
    - target: dmg
      arch:
        - arm64
        - x64
  category: public.app-category.music
  icon: build/icon.png
  hardenedRuntime: false
  gatekeeperAssess: false

win:
  target:
    - target: nsis
      arch:
        - x64
  icon: build/icon.ico

nsis:
  oneClick: false
  perMachine: false
  allowToChangeInstallationDirectory: true
  shortcutName: JM DAW

publish:
  provider: github
  owner: AlexmachtCode
  repo: alexzvn
  private: true
