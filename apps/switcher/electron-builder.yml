appId: gmbh.jakobs.switcher
productName: JM Switcher
artifactName: "${productName}-${version}-${os}-${arch}.${ext}"
copyright: "© Jakobs Medien GmbH"

directories:
  output: release
  buildResources: build

files:
  - out/**/*
  - package.json

extraResources:
  - from: resources
    to: .
    filter:
      - "**/*"

asar: true

# Der NDI-Empfänger nutzt das native @jm/ndi-Addon (lokal auf Windows gebaut;
# NDI-SDK nicht in CI). electron ist im Workspace ans Root gehoistet → npmRebuild
# aus, electronVersion fix; das Addon + die Runtime-DLL werden via bundle-ndi nach
# resources/bin/win gestaged. electronVersion bei Electron-Upgrade nachziehen.
electronVersion: 33.4.11
npmRebuild: false

mac:
  target:
    - target: dmg
      arch:
        - arm64
        - x64
  category: public.app-category.video
  icon: build/icon.png
  hardenedRuntime: false
  gatekeeperAssess: false

win:
  target:
    - target: nsis
      arch:
        - x64
  icon: build/icon.ico

nsis:
  oneClick: false
  perMachine: false
  allowToChangeInstallationDirectory: true
  shortcutName: JM Switcher
  createDesktopShortcut: false

publish:
  provider: github
  owner: AlexmachtCode
  repo: alexzvn
  private: true
