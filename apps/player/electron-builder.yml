appId: gmbh.jakobs.player
productName: JM Player
artifactName: "${productName}-${version}-${os}-${arch}.${ext}"
copyright: "© Jakobs Medien GmbH"

directories:
  output: release
  buildResources: build

files:
  - out/**/*
  - package.json

extraResources:
  - from: resources
    to: .
    filter:
      - "**/*"

asar: true
# better-sqlite3 liefert ein natives .node, das nicht aus der asar geladen
# werden kann → auspacken (Muster B, wie studio-control).
asarUnpack:
  - "**/node_modules/better-sqlite3/**"

mac:
  target:
    - target: dmg
      arch:
        - arm64
        - x64
  category: public.app-category.video
  icon: build/icon.png
  hardenedRuntime: false
  gatekeeperAssess: false

win:
  target:
    - target: nsis
      arch:
        - x64
  icon: build/icon.ico

nsis:
  oneClick: false
  perMachine: false
  allowToChangeInstallationDirectory: true
  shortcutName: JM Player

publish:
  provider: github
  owner: AlexmachtCode
  repo: alexzvn
  private: true
