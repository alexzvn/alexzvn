appId: gmbh.jakobs.recorder
productName: JM Audio Recorder
artifactName: "${productName}-${version}-${os}-${arch}.${ext}"
copyright: "© Jakobs Medien GmbH"

directories:
  output: release
  buildResources: build

files:
  - out/**/*
  - package.json

extraResources:
  - from: resources
    to: .
    filter:
      - "**/*"

asar: true
# Natives @jm/audio-Addon (jm_audio.node) nicht aus der asar laden.
asarUnpack:
  - "**/node_modules/@jm/audio/**"

mac:
  target:
    - target: dmg
      arch:
        - arm64
        - x64
  category: public.app-category.music
  icon: build/icon.png
  hardenedRuntime: false
  gatekeeperAssess: false

win:
  target:
    - target: nsis
      arch:
        - x64
  icon: build/icon.ico

nsis:
  oneClick: false
  perMachine: false
  allowToChangeInstallationDirectory: true
  shortcutName: JM Audio Recorder

publish:
  provider: github
  owner: AlexmachtCode
  repo: alexzvn
  private: true
