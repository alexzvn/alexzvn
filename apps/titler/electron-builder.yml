appId: gmbh.jakobs.titler
productName: JM Titler
artifactName: "${productName}-${version}-${os}-${arch}.${ext}"
copyright: "© Jakobs Medien GmbH"

directories:
  output: release
  buildResources: build

files:
  - out/**/*
  - package.json

extraResources:
  - from: resources
    to: .
    filter:
      - "**/*"

asar: true

# NDI wird LOKAL gebaut (NDI-SDK nicht in CI verfügbar) — Windows wie macOS
# (arm64). electron ist im Workspace ans Root gehoistet → electron-builder findet
# die Version sonst nicht; npmRebuild aus, weil das native Addon via electron-
# rebuild gebaut + von bundle-ndi nach resources/bin/<plat> gestaged wird.
# electronVersion bei Electron-Upgrade nachziehen.
electronVersion: 33.4.11
npmRebuild: false

win:
  target:
    - target: nsis
      arch:
        - x64
  icon: build/icon.ico

# macOS (Apple Silicon). Unsigniert/nicht notarisiert → Gatekeeper-Quarantäne:
# beim ersten Start Rechtsklick → „Öffnen" bzw. `xattr -dr com.apple.quarantine`.
mac:
  target:
    - target: dmg
      arch:
        - arm64
  category: public.app-category.video
  icon: build/icon.png
  hardenedRuntime: false
  gatekeeperAssess: false

nsis:
  oneClick: false
  perMachine: false
  allowToChangeInstallationDirectory: true
  shortcutName: JM Titler
  createDesktopShortcut: false

publish:
  provider: github
  owner: AlexmachtCode
  repo: alexzvn
  private: true
