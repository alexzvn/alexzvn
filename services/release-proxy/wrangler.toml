name = "jm-suite-proxy"
main = "worker.js"
compatibility_date = "2024-11-01"

# Klartext-Variablen.
[vars]
# Das Mono-Repo mit den Releases.
REPO = "AlexmachtCode/alexzvn"
# Branch/Ref, aus dem der Live-Katalog (suite.json + changelog.json) gelesen wird.
# Seit dem Merge von feat/suite-newtools nach main ist das der Default-Branch.
# Bei einem Wechsel hier ändern, dann `npx wrangler deploy` UND die Repo-Variable
# MANIFEST_BRANCH (CI-Bump-Ziel) synchron halten — sonst Katalog-Drift.
MANIFEST_REF = "main"

# Secrets NICHT hier eintragen — verschlüsselt setzen:
#   npx wrangler secret put GITHUB_TOKEN   (fine-grained PAT, read-only Contents)
#   npx wrangler secret put PROXY_KEY      (gemeinsamer Zugriffs-Key)
