name: Suite Release

# Auf Tag-Push `<app>-v<version>` (z. B. copy-v0.1.0, studio-control-v0.2.1):
# baut das Tool für macOS + Windows und veröffentlicht die Installer in EIN
# GitHub-Release unter genau diesem Tag. Im Monorepo unterscheiden sich die Tools
# über das Tag-Präfix `<app>-v` — electron-builder selbst würde immer `v<version>`
# anlegen und die Tools kollidieren lassen, daher legen wir das Release per gh an
# und lassen electron-builder nur bauen (`--publish never`).
# Der Launcher liest diese Releases als Update-Quelle (GithubReleaseSource).
on:
  push:
    tags:
      - "*-v*.*.*"

jobs:
  release:
    name: ${{ matrix.os }}
    # Tools mit nativen Addons werden NICHT in CI gebaut (lizenzierte, nicht
    # redistribuierbare SDKs fehlen auf GitHub-Runnern):
    #   - ndi-screen-capture + switcher + titler → @jm/ndi (NDI-SDK)
    #   - recorder + daw                         → @jm/audio (PortAudio/ASIO-SDK)
    #   - transcribe + caption                   → whisper.cpp-Binary + Modell (+ caption: @jm/ndi)
    # Diese werden lokal auf Windows gebaut und das Release manuell angelegt
    # (gh release create <app>-v<version> + Installer-Upload).
    if: ${{ !startsWith(github.ref_name, 'ndi-screen-capture-v') && !startsWith(github.ref_name, 'switcher-v') && !startsWith(github.ref_name, 'recorder-v') && !startsWith(github.ref_name, 'titler-v') && !startsWith(github.ref_name, 'transcribe-v') && !startsWith(github.ref_name, 'caption-v') && !startsWith(github.ref_name, 'daw-v') }}
    strategy:
      fail-fast: false
      matrix:
        os: [macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: 20

      - name: Resolve app from tag
        id: app
        shell: bash
        run: |
          # Tag = "<app>-v<version>" → app = alles vor "-v"
          tag="${GITHUB_REF_NAME}"
          echo "name=${tag%-v*}" >> "$GITHUB_OUTPUT"

      - name: Install (workspaces)
        run: npm ci

      - name: Build renderer/main (electron-vite)
        run: npm run build -w @jm/${{ steps.app.outputs.name }}
        env:
          # Vom Launcher-Build zur Build-Zeit eingebacken (vite define). Bei den
          # anderen Tools ungenutzt/harmlos. Leer, falls Secret nicht gesetzt.
          JMPS_PROXY_KEY: ${{ secrets.JMPS_PROXY_KEY }}

      # electron ist im Workspace ans Root gehoistet → Version in die Config
      # schreiben (shell-sicher, statt -c.electronVersion am CLI; pwsh zerlegt das).
      # npmRebuild: false → electron-builder überspringt den Schritt "installing
      # production dependencies" im appDir. Seit die Lockfile electron-builder/
      # 7zip-bin an die Root hoistet (statt pro App genested), zerstört dieser
      # Schritt sonst die einzige 7zip-bin-Kopie → "ENOENT chmod 7za". Unsere Apps
      # sind reines JS (vite bündelt alles in out/), daher ist das gefahrlos.
      - name: Inject electron version + disable npmRebuild into config
        shell: bash
        run: |
          ver=$(node -p "require('electron/package.json').version")
          printf '\nelectronVersion: %s\nnpmRebuild: false\n' "$ver" >> "apps/${{ steps.app.outputs.name }}/electron-builder.yml"
          echo "electronVersion=$ver npmRebuild=false"

      # Tool-spezifische Vorbereitung (z. B. media-converter bündelt ffmpeg aus
      # ffmpeg-static/ffprobe-static nach resources/bin/<platform>/). Tools ohne
      # `prepackage`-Script werden dank --if-present übersprungen.
      - name: Prepare bundled binaries (if any)
        run: npm run prepackage -w @jm/${{ steps.app.outputs.name }} --if-present

      - name: Package (electron-builder, unsigniert)
        working-directory: apps/${{ steps.app.outputs.name }}
        run: npx electron-builder --publish never
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: "false"

      # Release unter dem Trigger-Tag anlegen (idempotent — der andere Matrix-Job
      # kann zuvorkommen) und die plattformspezifischen Installer hochladen.
      - name: Create release + upload installers
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          tag="${GITHUB_REF_NAME}"
          app="${{ steps.app.outputs.name }}"
          gh release view "$tag" --repo "$GITHUB_REPOSITORY" >/dev/null 2>&1 \
            || gh release create "$tag" --repo "$GITHUB_REPOSITORY" \
                 --title "$app $tag" \
                 --notes "Automatisches Release für $app ($tag)." \
                 --prerelease \
            || true
          shopt -s nullglob
          files=(apps/$app/release/*.dmg apps/$app/release/*.exe)
          if [ ${#files[@]} -eq 0 ]; then
            echo "Keine Installer gefunden unter apps/$app/release/"; exit 1
          fi
          echo "Lade hoch: ${files[*]}"
          gh release upload "$tag" "${files[@]}" --repo "$GITHUB_REPOSITORY" --clobber

  # latestVersion in suite.json automatisch nachziehen, sobald der CI-Build
  # erfolgreich released wurde — ersetzt das manuelle Pflegen der Katalog-Version.
  # Läuft nur bei vollständigem Erfolg der Matrix (kein Bump bei Teilausfall).
  # Native Tools (ndi-screen-capture/switcher/recorder/daw/titler/transcribe)
  # bauen lokal und sind oben per `if` ausgenommen → deren Version bumpt man lokal:
  #   node scripts/bump-manifest.mjs <app> <version>
  bump-manifest:
    name: Bump suite.json
    needs: release
    if: ${{ needs.release.result == 'success' }}
    runs-on: ubuntu-latest
    permissions:
      contents: write
    # Serialisiert gleichzeitige Bumps (mehrere Tags) auf denselben Branch.
    concurrency:
      group: manifest-bump
      cancel-in-progress: false
    steps:
      - name: Resolve app + version + manifest branch
        id: meta
        shell: bash
        env:
          # Branch, aus dem der Proxy den Live-Katalog liest (wrangler.toml
          # MANIFEST_REF). Als Repo-Variable MANIFEST_BRANCH setzen und mit
          # MANIFEST_REF synchron halten; sonst Default-Branch.
          MANIFEST_BRANCH: ${{ vars.MANIFEST_BRANCH }}
          DEFAULT_BRANCH: ${{ github.event.repository.default_branch }}
        run: |
          tag="${GITHUB_REF_NAME}"
          echo "app=${tag%-v*}" >> "$GITHUB_OUTPUT"
          echo "version=${tag##*-v}" >> "$GITHUB_OUTPUT"
          echo "branch=${MANIFEST_BRANCH:-$DEFAULT_BRANCH}" >> "$GITHUB_OUTPUT"

      - uses: actions/checkout@v5
        with:
          ref: ${{ steps.meta.outputs.branch }}

      - uses: actions/setup-node@v5
        with:
          node-version: 20

      - name: Bump latestVersion
        id: bump
        run: node scripts/bump-manifest.mjs "${{ steps.meta.outputs.app }}" "${{ steps.meta.outputs.version }}"

      - name: Commit + push
        if: ${{ steps.bump.outputs.changed == '1' }}
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add packages/suite-manifest/suite.json
          git commit -m "chore(manifest): ${{ steps.meta.outputs.app }} latestVersion → ${{ steps.meta.outputs.version }} [skip ci]"
          git push origin "HEAD:${{ steps.meta.outputs.branch }}"
