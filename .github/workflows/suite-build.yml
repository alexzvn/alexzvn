name: Suite Build (artifacts)

# Baut ein Workspace-Tool für macOS + Windows und lädt die Installer als
# herunterladbare Artefakte hoch (kein Release, keine Signatur).
# - workflow_dispatch: beliebiges Tool über die Eingabe `app`
# - push auf den Feature-Branch: baut automatisch den Launcher (zum Testen)
on:
  workflow_dispatch:
    inputs:
      app:
        description: "Workspace-Tool (Ordnername unter apps/, z. B. launcher, media-converter, copy)"
        default: "launcher"
        type: string
  push:
    branches: ["feat/jm-production-suite"]
    paths-ignore:
      - "**/*.md"

jobs:
  build:
    name: ${{ matrix.os }}
    env:
      APP: ${{ github.event.inputs.app || 'launcher' }}
    strategy:
      fail-fast: false
      matrix:
        os: [macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install (workspaces)
        run: npm ci

      - name: Build renderer/main (electron-vite)
        run: npm run build -w @jm/${{ env.APP }}

      # electron ist im Workspace ans Root gehoistet → Version in die Config
      # schreiben (shell-sicher, statt -c.electronVersion am CLI; pwsh zerlegt das).
      - name: Inject electron version into config
        shell: bash
        run: |
          ver=$(node -p "require('electron/package.json').version")
          printf '\nelectronVersion: %s\n' "$ver" >> "apps/${APP}/electron-builder.yml"
          echo "electronVersion=$ver"

      - name: Package (electron-builder, unsigniert)
        working-directory: apps/${{ env.APP }}
        run: npx electron-builder --publish never
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: "false"

      - name: Upload installers
        uses: actions/upload-artifact@v4
        with:
          name: jm-${{ env.APP }}-${{ matrix.os }}
          if-no-files-found: warn
          path: |
            apps/${{ env.APP }}/release/*.dmg
            apps/${{ env.APP }}/release/*.exe
