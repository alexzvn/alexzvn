name: Suite Build (artifacts)

# Baut Workspace-Tools für macOS + Windows und lädt die Installer als
# herunterladbare Artefakte hoch (kein Release, keine Signatur).
# - workflow_dispatch: genau EIN Tool über die Eingabe `app`
# - push auf den Feature-Branch: baut ALLE Tools (Matrix) zum Testen
#   (temporär — vor dem Merge nach main wieder eindampfen).
on:
  workflow_dispatch:
    inputs:
      app:
        description: "Workspace-Tool (Ordnername unter apps/, z. B. launcher, media-converter, copy)"
        default: "launcher"
        type: string
  push:
    branches: ["feat/jm-production-suite"]
    paths-ignore:
      - "**/*.md"

jobs:
  build:
    name: ${{ matrix.app }} · ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [macos-latest, windows-latest]
        # Bei Dispatch genau das eingegebene Tool; bei Push die ganze Suite.
        app: ${{ fromJSON(github.event_name == 'workflow_dispatch' && format('["{0}"]', github.event.inputs.app) || '["launcher","copy","sync","grafiktool","studio-control","timer","media-converter"]') }}
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install (workspaces)
        run: npm ci

      - name: Build renderer/main (electron-vite)
        run: npm run build -w @jm/${{ matrix.app }}

      # electron ist im Workspace ans Root gehoistet → Version in die Config
      # schreiben (shell-sicher, statt -c.electronVersion am CLI; pwsh zerlegt das).
      - name: Inject electron version into config
        shell: bash
        run: |
          ver=$(node -p "require('electron/package.json').version")
          printf '\nelectronVersion: %s\n' "$ver" >> "apps/${{ matrix.app }}/electron-builder.yml"
          echo "electronVersion=$ver"

      - name: Package (electron-builder, unsigniert)
        working-directory: apps/${{ matrix.app }}
        run: npx electron-builder --publish never
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: "false"

      - name: Upload installers
        uses: actions/upload-artifact@v4
        with:
          name: jm-${{ matrix.app }}-${{ matrix.os }}
          if-no-files-found: warn
          path: |
            apps/${{ matrix.app }}/release/*.dmg
            apps/${{ matrix.app }}/release/*.exe
